<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jam</title>
    <style>
        body {
    background: url("/static/bg.jpg") no-repeat center center fixed;
    background-size: cover;
    font-family: "Comic Sans MS", cursive;
    overflow: hidden;
    margin: 0;
    height: 100vh;
    color: #fff;
}

h1 {
    text-align: center;
    font-size: 40px;
    color: #fff;
    text-shadow: 2px 2px black;
    margin-top: 10px;
}

/* Smaller title on mobile */
@media (max-width: 600px) {
    h1 {
        font-size: 26px;
    }
}

@keyframes floatBubble {
    0% { transform: translateY(0px) translateX(0px); }
    50% { transform: translateY(-15px) translateX(8px); }
    100% { transform: translateY(0px) translateX(0px); }
}

.bubble {
    animation: floatBubble 4s ease-in-out infinite;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.3) 40%, rgba(0,200,255,0.1) 80%, rgba(0,150,255,0.05) 100%);
    box-shadow: 
        inset -5px -5px 15px rgba(255,255,255,0.7),
        inset 5px 5px 15px rgba(0,150,255,0.2),
        0 5px 15px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    cursor: pointer;
    position: absolute;
    transition: transform 0.2s, opacity 0.3s;
}

/* Bigger bubbles on desktop */
@media (min-width: 768px) {
    .bubble {
        width: 100px;
        height: 100px;
        font-size: 40px;
    }
}

.bubble:hover {
    transform: scale(1.2);
}

.letter {
    display: none;
    color: black;
    font-weight: bold;
}

/* POPUP FIXED */
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: #ffffff;
    color: #222; /* DARK TEXT = EASY TO READ */
    
    border-radius: 15px;
    padding: 20px;
    z-index: 100;
    
    text-align: center;
    font-size: 18px;
    
    width: 85%;
    max-width: 400px;
    
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Bigger text on desktop */
@media (min-width: 768px) {
    .popup {
        font-size: 22px;
        padding: 30px;
    }
}

.popup button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #ffd54f;
    font-weight: bold;
}
    </style>
</head>
<body>

<h1>HAPPY BIRTHDAY JAM</h1>

<!-- Bubbles -->
<div id="bubble-container"></div>

<!-- Popup -->
<div id="popup" class="popup">
    <span id="popup-message"></span><br>
    <button onclick="closePopup()">Close</button>
</div>

<script>
const bubbles = [
    {letter: "Ding", message: "Happy Birthday Jam! ari lang kami di pirme ni ken for you, sa troubles in life or sa kalipayan man na. Padayuna lang ang gusto mo sa kabuhi kag never doubt yourself kay kami wala ga doubt sa kung ano ma reach mo in life. Never lose your character, always be that jolly and cheerful jammy despite sa problems mo, you deserve eveything that you have righ now and what you will earn in the future. Your manongs will always be here for you. -Ding"},
    {letter: "Keken", message: "waay"},
    {letter: "EJ", message: "Happy birthday langga padayun lng sa mga handom na gusto mo kg makwa muna tungod sa pangabudlay tas paningwa very hardworking person kagd katama nakita na tanan ni lord may baylo gd na tanan nga ginapangabudlayan mo kg gna pabakod ya pagd ka, tighten lng gd faith mo saiya ga ah super thanks gd katama sa pg tindog bilang leader sa grupo kg gapadayun saiya pg serbisyo keep it up po iloveyouuu mwa. -EJ"},
    {letter: "Geson", message: "Hi bro, Happy Birthday!! Dahil 22 kana, sana wag kang magbago kana. You already know nga I wish you all the best in life and sana mabohai ka hanggang sa gusto mo. ILSYM GBY MBTC!!! 🎊🥳🫶🏻 -Geson"},
    {letter: "Shan", message: "HAHAHAHA"}
];

const container = document.getElementById('bubble-container');

// Create scattered bubbles
bubbles.forEach((b, index) => {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.top = Math.random() * 70 + 10 + '%'; // scattered vertically
    bubble.style.left = Math.random() * 80 + 10 + '%'; // scattered horizontally
    bubble.innerHTML = `<span class="letter">${b.letter}</span>`;
    
    bubble.onclick = () => showPopup(bubble, b.message);
    
    container.appendChild(bubble);
});

// Show popup when bubble clicked
function showPopup(bubble, message) {
    const letter = bubble.querySelector('.letter');
    letter.style.display = 'block';          // reveal letter
    bubble.style.transform = 'scale(0)';     // simulate bubble popping
    bubble.style.opacity = '0';
    
    const popup = document.getElementById('popup');
    document.getElementById('popup-message').innerText = message;
    popup.style.display = 'block';
}

// Close popup
function closePopup() {
    document.getElementById('popup').style.display = 'none';
}
</script>

</body>
</html>
